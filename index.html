<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gleearl — temporarily unavailable</title>
  <meta name="description" content="gleearl's site is temporarily offline for maintenance.">
  <meta name="robots" content="noindex">
  <style>
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --border: #21262d;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa;
        --fg: #1f2328;
        --muted: #656d76;
        --accent: #0969da;
        --border: #d0d7de;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main {
      max-width: 34rem;
      width: 100%;
    }
    .prompt {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }
    .prompt::before { content: "$ "; color: var(--accent); }
    h1 {
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .cursor {
      display: inline-block;
      width: 0.6em;
      height: 1.1em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 0.15em;
      animation: blink 1.1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    p.sub {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .email { color: var(--muted); }
    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <p class="prompt">maintenance in progress…</p>
    <h1>gleearl<span class="cursor" aria-hidden="true"></span></h1>
    <p class="sub">This site is temporarily offline for scheduled maintenance and will be back shortly. Thanks for your patience.</p>
    <div class="links">
      <a href="https://github.com/gleearl">github</a>
      <span class="email">glee.rupal@gmail.com</span>
    </div>
  </main>
</body>
</html>
